name: Build explainme.wtf

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build with PyInstaller
        run: python -m PyInstaller app.spec --clean

      - name: Include README
        run: copy README.md dist\explainme.wtf\README.md

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: explainme.wtf-Windows
          path: dist/explainme.wtf/

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build with PyInstaller
        run: python -m PyInstaller app.spec --clean

      - name: Include README
        run: cp README.md dist/explainme.wtf/README.md

      - name: Upload macOS build
        uses: actions/upload-artifact@v4
        with:
          name: explainme.wtf-macOS
          path: dist/explainme.wtf/

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: explainme.wtf-Windows
          path: explainme.wtf-Windows

      - name: Download macOS Artifacts
        uses: actions/download-artifact@v4
        with:
          name: explainme.wtf-macOS
          path: explainme.wtf-macOS

      - name: Zip Windows Release
        run: |
          cd explainme.wtf-Windows
          zip -r ../explainme.wtf-Windows.zip *

      - name: Zip macOS Release
        run: |
          cd explainme.wtf-macOS
          zip -r ../explainme.wtf-macOS.zip *

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            explainme.wtf-Windows.zip
            explainme.wtf-macOS.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
