name: Build explainme.wtf

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build with PyInstaller
        run: python -m PyInstaller app.spec --clean

      - name: Include README
        run: copy README.md dist\explainme.wtf\README.md

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: explainme.wtf-Windows
          path: dist/explainme.wtf/

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build with PyInstaller
        run: python -m PyInstaller app.spec --clean

      - name: Include README
        run: cp README.md dist/explainme.wtf/README.md

      - name: Upload macOS build
        uses: actions/upload-artifact@v4
        with:
          name: explainme.wtf-macOS
          path: dist/explainme.wtf/
